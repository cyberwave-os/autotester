name: Release
on:
  push:
    branches:
      - main
      - pre/*

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and run tests
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip setuptools wheel hatchling
          pip install -e ".[test]"
          pytest tests/ -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Install git
        run: |
          sudo apt update
          sudo apt install -y git

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node Env
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Build and validate package
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip setuptools wheel hatchling
          pip install -e .
          pip install build
          python -m build --wheel
          pip install --upgrade pkginfo==1.12.0 twine==6.0.1
          python -m twine check dist/*

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, build]
    environment: pypi
    if: >
      github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/pre/beta') ||
      (github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged &&
       (github.event.pull_request.base.ref == 'main' || github.event.pull_request.base.ref == 'pre/beta'))
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node Env
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4.1.0
        with:
          semantic_version: 23
          extra_plugins: |
            @semantic-release/git
            @semantic-release/exec
            @semantic-release/commit-analyzer@12
            @semantic-release/release-notes-generator@13
            @semantic-release/github@10
            @semantic-release/changelog@6
            conventional-changelog-conventionalcommits@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build package
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          pip install --upgrade pip build hatchling
          python -m build

      - name: Publish to PyPI
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
