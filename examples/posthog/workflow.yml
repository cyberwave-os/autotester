name: Autotester E2E with Posthog Replay

on:
  pull_request:
    branches: [main]

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Run Autotester E2E Tests
        id: autotester
        uses: cyberwave-os/autotester-action@v0.1.0
        with:
          action-type: "e2e"
          verbose: "true"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}

      - name: Notify Slack (with recording links)
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        shell: bash
        run: |
          RESULTS=".autotester/e2e.json"
          if [ ! -f "$RESULTS" ]; then
            TEXT="⚠️ *Autotester E2E* — no results file found\nRun: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
          else
            TOTAL=$(jq length "$RESULTS")
            PASSED=$(jq '[.[] | select(.passed == true)] | length' "$RESULTS")

            if [ "$PASSED" -eq "$TOTAL" ]; then
              TEXT="✅ *Autotester E2E* — $PASSED/$TOTAL passed"
            else
              TEXT="❌ *Autotester E2E* — $PASSED/$TOTAL passed"
            fi

            # Build per-test details; include Posthog recording link for failures
            DETAILS=$(jq -r '.[] |
              if .passed then "✅ " + .name
              else "❌ " + .name + "\n>  " + .comment
                + (if .recording_url then "\n>  🎥 <" + .recording_url + "|Watch recording>" else "" end)
              end' "$RESULTS")

            TEXT="$TEXT\n\n$DETAILS"
            TEXT="$TEXT\n\n<${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}|PR #${{ github.event.pull_request.number }}> · <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|Logs>"
          fi

          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg t "$TEXT" '{text: $t}')"
